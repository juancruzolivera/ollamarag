<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guanaco Advisor · Chat</title>
  <style>
    :root {
      /* Paleta ADEN */
      --rojo:      #B31D15;
      --rojo-osc:  #8f160f;
      --gris-osc:  #535353;
      --gris:      #838383;
      --negro:     #000000;
      --blanco:    #ffffff;
      /* Derivados claros (tintes para fondos y bordes) */
      --bg:        #f4f4f5;
      --panel:     #ffffff;
      --burbuja:   #f0f0f1;
      --border:    #e2e2e4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--gris-osc);
    }
    header {
      padding: 12px 22px; background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    header .logo { width: 40px; height: 40px; display: block; flex-shrink: 0; object-fit: contain; }
    header .brand { display: flex; flex-direction: column; line-height: 1.15; }
    header h1 {
      font-size: 16px; margin: 0; font-weight: 700; color: var(--negro);
      letter-spacing: .2px;
    }
    header .sub { font-size: 11px; color: var(--gris); font-weight: 500; }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--rojo);
      box-shadow: 0 0 0 0 rgba(179,29,21,.5); animation: pulso 2s infinite;
    }
    @keyframes pulso {
      0%   { box-shadow: 0 0 0 0 rgba(179,29,21,.45); }
      70%  { box-shadow: 0 0 0 6px rgba(179,29,21,0); }
      100% { box-shadow: 0 0 0 0 rgba(179,29,21,0); }
    }
    header .meta { margin-left: auto; font-size: 12px; color: var(--gris); }
    header .nueva {
      font-size: 12px; font-weight: 600; color: var(--rojo); background: transparent;
      border: 1px solid var(--rojo); border-radius: 8px; padding: 6px 12px;
      cursor: pointer; transition: background .15s, color .15s; width: auto;
    }
    header .nueva:hover { background: var(--rojo); color: #fff; }
    #chat {
      flex: 1; overflow-y: auto; padding: 22px; display: flex;
      flex-direction: column; gap: 16px; max-width: 820px; width: 100%; margin: 0 auto;
    }
    .msg { display: flex; flex-direction: column; gap: 6px; max-width: 88%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }
    .bubble {
      padding: 11px 15px; border-radius: 14px; line-height: 1.5;
      white-space: pre-wrap; word-wrap: break-word; font-size: 15px;
    }
    .user .bubble {
      background: var(--rojo); color: var(--blanco);
      border-bottom-right-radius: 4px;
    }
    .bot  .bubble {
      background: var(--panel); color: var(--gris-osc);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .fuentes { display: flex; flex-wrap: wrap; gap: 6px; }
    .fuente {
      font-size: 11px; color: var(--gris); background: var(--burbuja);
      border: 1px solid var(--border); padding: 3px 8px; border-radius: 20px;
    }
    .fuente b { color: var(--rojo); font-weight: 700; }
    .pensando { color: var(--gris); font-style: italic; }
    form {
      display: flex; gap: 10px; padding: 16px 20px; background: var(--panel);
      border-top: 1px solid var(--border); max-width: 820px; width: 100%; margin: 0 auto;
    }
    #q {
      flex: 1; background: var(--blanco); border: 1px solid var(--border);
      color: var(--negro); border-radius: 10px; padding: 12px 14px;
      font-size: 15px; outline: none; resize: none; font-family: inherit;
      transition: border-color .15s;
    }
    #q:focus { border-color: var(--rojo); }
    button {
      background: var(--rojo); color: var(--blanco); border: 0; border-radius: 10px;
      padding: 0 22px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    button:hover:not(:disabled) { background: var(--rojo-osc); }
    button:disabled { opacity: .45; cursor: default; }
    .empty { color: var(--gris); text-align: center; margin-top: 12vh; font-size: 15px; }
  </style>
</head>

    <div class="brand">
      <h1>Guanaco Advisor</h1>
      <span class="sub">Asistente ADEN</span>
    </div>
    <span class="dot"></span>
    <span class="meta" id="meta">conectando…</span>
    <button class="nueva" id="nueva" title="Borrar el historial y empezar de cero">Nueva conversación</button>
  </header>

  <div id="chat">
    <div class="empty" id="empty">Preguntá algo sobre tus documentos 👇</div>
  </div>

  <form id="form">
    <textarea id="q" rows="1" placeholder="Escribí tu pregunta…" autocomplete="off"></textarea>
    <button type="submit" id="send">Enviar</button>
  </form>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const q = document.getElementById('q');
    const send = document.getElementById('send');
    const meta = document.getElementById('meta');
    const empty = document.getElementById('empty');

    // --- Memoria de conversación: identificador de sesión ---
    function nuevoId() {
      return (crypto.randomUUID && crypto.randomUUID())
             || ('s-' + Date.now() + '-' + Math.random().toString(16).slice(2));
    }
    let sessionId = nuevoId();
    const btnNueva = document.getElementById('nueva');
    btnNueva?.addEventListener('click', async () => {
      try {
        await fetch('/reiniciar', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
      } catch (e) {}
      sessionId = nuevoId();
      chat.innerHTML = '<div class="empty" id="empty">Nueva conversación. Preguntá algo 👇</div>';
      q.focus();
    });

    // Estado de la base al cargar
    fetch('/salud').then(r => r.json()).then(d => {
      meta.textContent = `${d.modelo_llm} · ${d.vectores} vectores`;
    }).catch(() => meta.textContent = 'sin conexión');

    function addMsg(role, text) {
      document.getElementById('empty')?.remove();
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return wrap;
    }

    function addFuentes(wrap, fuentes) {
      if (!fuentes || !fuentes.length) return;
      const cont = document.createElement('div');
      cont.className = 'fuentes';
      const vistas = new Set();
      fuentes.forEach(f => {
        const key = f.fuente;
        if (vistas.has(key)) return;
        vistas.add(key);
        const tag = document.createElement('span');
        tag.className = 'fuente';
        tag.innerHTML = `📄 <b>${f.fuente ?? '?'}</b>`;
        cont.appendChild(tag);
      });
      wrap.appendChild(cont);
      chat.scrollTop = chat.scrollHeight;
    }

    // Auto-resize del textarea
    q.addEventListener('input', () => {
      q.style.height = 'auto';
      q.style.height = Math.min(q.scrollHeight, 160) + 'px';
    });
    // Enter envía, Shift+Enter hace salto de línea
    q.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const pregunta = q.value.trim();
      if (!pregunta) return;

      addMsg('user', pregunta);
      q.value = ''; q.style.height = 'auto';
      send.disabled = true;

      const botWrap = addMsg('bot', '');
      const bubble = botWrap.querySelector('.bubble');
      bubble.classList.add('pensando');
      bubble.textContent = 'Pensando…';

      try {
        const r = await fetch('/preguntar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pregunta, session_id: sessionId })
        });
        const data = await r.json();
        if (data.session_id) sessionId = data.session_id;
        bubble.classList.remove('pensando');
        bubble.textContent = data.respuesta || '(sin respuesta)';
        addFuentes(botWrap, data.fuentes);
      } catch (err) {
        bubble.classList.remove('pensando');
        bubble.textContent = '⚠️ Error al consultar la API: ' + err;
      } finally {
        send.disabled = false;
        q.focus();
      }
    });

    q.focus();
  </script>
</body>
</html>

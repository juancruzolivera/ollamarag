<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ollamaRAG · Chat</title>
  <style>
    :root {
      --bg: #0f1117; --panel: #1a1d27; --panel2: #232733;
      --txt: #e6e8ee; --muted: #8b90a0; --accent: #6c8cff; --accent2: #2a3358;
      --user: #2a3358; --bot: #1f2330; --border: #2a2f3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--txt);
    }
    header {
      padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: #3ddc84; }
    header .meta { margin-left: auto; font-size: 12px; color: var(--muted); }
    #chat {
      flex: 1; overflow-y: auto; padding: 22px; display: flex;
      flex-direction: column; gap: 16px; max-width: 820px; width: 100%; margin: 0 auto;
    }
    .msg { display: flex; flex-direction: column; gap: 6px; max-width: 88%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }
    .bubble {
      padding: 11px 15px; border-radius: 14px; line-height: 1.5;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .user .bubble { background: var(--user); border-bottom-right-radius: 4px; }
    .bot  .bubble { background: var(--bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .fuentes { display: flex; flex-wrap: wrap; gap: 6px; }
    .fuente {
      font-size: 11px; color: var(--muted); background: var(--panel2);
      border: 1px solid var(--border); padding: 3px 8px; border-radius: 20px;
    }
    .fuente b { color: var(--accent); font-weight: 600; }
    .pensando { color: var(--muted); font-style: italic; }
    form {
      display: flex; gap: 10px; padding: 16px 20px; background: var(--panel);
      border-top: 1px solid var(--border); max-width: 820px; width: 100%; margin: 0 auto;
    }
    #q {
      flex: 1; background: var(--panel2); border: 1px solid var(--border); color: var(--txt);
      border-radius: 10px; padding: 12px 14px; font-size: 15px; outline: none; resize: none;
    }
    #q:focus { border-color: var(--accent); }
    button {
      background: var(--accent); color: #fff; border: 0; border-radius: 10px;
      padding: 0 20px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: default; }
    .empty { color: var(--muted); text-align: center; margin-top: 12vh; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>ollamaRAG</h1>
    <span class="meta" id="meta">conectando…</span>
  </header>

  <div id="chat">
    <div class="empty" id="empty">Preguntá algo sobre tus documentos 👇</div>
  </div>

  <form id="form">
    <textarea id="q" rows="1" placeholder="Escribí tu pregunta…" autocomplete="off"></textarea>
    <button type="submit" id="send">Enviar</button>
  </form>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const q = document.getElementById('q');
    const send = document.getElementById('send');
    const meta = document.getElementById('meta');
    const empty = document.getElementById('empty');

    // Estado de la base al cargar
    fetch('/salud').then(r => r.json()).then(d => {
      meta.textContent = `${d.modelo_llm} · ${d.vectores} vectores`;
    }).catch(() => meta.textContent = 'sin conexión');

    function addMsg(role, text) {
      empty?.remove();
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return wrap;
    }

    function addFuentes(wrap, fuentes) {
      if (!fuentes || !fuentes.length) return;
      const cont = document.createElement('div');
      cont.className = 'fuentes';
      const vistas = new Set();
      fuentes.forEach(f => {
        const key = f.fuente;
        if (vistas.has(key)) return;
        vistas.add(key);
        const tag = document.createElement('span');
        tag.className = 'fuente';
        tag.innerHTML = `📄 <b>${f.fuente ?? '?'}</b>`;
        cont.appendChild(tag);
      });
      wrap.appendChild(cont);
      chat.scrollTop = chat.scrollHeight;
    }

    // Auto-resize del textarea
    q.addEventListener('input', () => {
      q.style.height = 'auto';
      q.style.height = Math.min(q.scrollHeight, 160) + 'px';
    });
    // Enter envía, Shift+Enter hace salto de línea
    q.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const pregunta = q.value.trim();
      if (!pregunta) return;

      addMsg('user', pregunta);
      q.value = ''; q.style.height = 'auto';
      send.disabled = true;

      const botWrap = addMsg('bot', '');
      const bubble = botWrap.querySelector('.bubble');
      bubble.classList.add('pensando');
      bubble.textContent = 'Pensando…';

      try {
        const r = await fetch('/preguntar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pregunta })
        });
        const data = await r.json();
        bubble.classList.remove('pensando');
        bubble.textContent = data.respuesta || '(sin respuesta)';
        addFuentes(botWrap, data.fuentes);
      } catch (err) {
        bubble.classList.remove('pensando');
        bubble.textContent = '⚠️ Error al consultar la API: ' + err;
      } finally {
        send.disabled = false;
        q.focus();
      }
    });

    q.focus();
  </script>
</body>
</html>
